name: HotelB CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # JOB 1: BACKEND TESTS
  # ============================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run Backend Tests
        run: |
          cd backend
          npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret
          GOOGLE_CLIENT_ID: test_client_id
          GOOGLE_CLIENT_SECRET: test_secret
          EMAIL_USER: test@test.com
          EMAIL_PASSWORD: test_password
          MONGO_URI: mongodb://127.0.0.1:27017/hotelB_test
      
      - name: Test Coverage
        run: |
          cd backend
          npm test -- --coverage --coverageReporters=text
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: backend/coverage/

  # ============================================
  # JOB 2: FRONTEND TESTS
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: https://hotelb-luy6.onrender.com/api
          VITE_GOOGLE_CLIENT_ID: 121545485958-h51d7goabuarsharoiob45dq5hghclr6.apps.googleusercontent.com
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder_publishable
      
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: frontend-tests
          path: frontend/test-results/

  # ============================================
  # JOB 3: DEPLOY BACKEND TO NETLIFY
  # ============================================
  deploy-backend:
    name: Deploy Backend to Netlify
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && success()
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      
      - name: Deploy to Netlify
        run: |
          cd backend
          netlify deploy --prod --dir=. --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Deployment Status
        run: echo "Backend deployed successfully to Netlify"

  # ============================================
  # JOB 4: DEPLOY FRONTEND TO VERCEL
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && success()
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Setup Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: --prod
      
      - name: Deployment Status
        run: echo "Frontend deployed successfully to Vercel"

  # ============================================
  # JOB 5: NOTIFICATION
  # ============================================
  notify:
    name: Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: success()
    
    steps:
      - name: Success Message
        run: |
          echo "=========================================="
          echo "DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo ""
          echo "Backend Tests Passed"
          echo "Frontend Tests Passed"
          echo "Backend Deployed to Netlify"
          echo "Frontend Deployed to Vercel"
          echo ""
          echo "Frontend URL: https://hotelb.vercel.app"
          echo "Backend URL: https://hotelb-api.netlify.app"
          echo "=========================================="